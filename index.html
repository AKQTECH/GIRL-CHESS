<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fdeaf4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Girl Chess">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Girl Chess</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="icon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #fffafd;
      --pink-1: #fdeaf4;
      --pink-2: #f8d2e4;
      --pink-3: #efafd0;
      --pink-4: #d982b2;
      --pink-5: #bd6798;
      --black: #151015;
      --line: rgba(21, 16, 21, 0.76);
      --line-soft: rgba(21, 16, 21, 0.34);
      --shadow: 0 18px 34px rgba(21, 16, 21, 0.12);
      --square: min(9.8vw, 62px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--pink-1);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--black);
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(90deg, rgba(217, 130, 178, 0.16) 1px, transparent 1px),
        linear-gradient(rgba(217, 130, 178, 0.16) 1px, transparent 1px),
        var(--pink-1);
      background-size: 24px 24px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: var(--black);
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .app-shell {
      width: min(1260px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 12px;
      border: 2px solid var(--line);
      background: rgba(255, 250, 253, 0.94);
      box-shadow: var(--shadow);
    }

    .brand {
      margin: 0;
      font-family: "Silkscreen", monospace;
      font-size: clamp(25px, 4vw, 48px);
      line-height: 0.9;
      text-transform: lowercase;
    }

    .view-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .tab-button,
    .small-button,
    .primary-button,
    .lesson-button,
    .legend-card,
    .square {
      -webkit-tap-highlight-color: transparent;
    }

    .tab-button {
      min-height: 40px;
      padding: 8px 13px;
      border: 2px solid var(--line);
      background: var(--pink-2);
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      text-transform: lowercase;
    }

    .tab-button[aria-pressed="true"] {
      background: var(--white);
      box-shadow: inset 0 -5px 0 var(--pink-3);
    }

    .progress-pill {
      min-height: 40px;
      display: grid;
      place-items: center;
      padding: 8px 12px;
      border: 2px solid var(--line);
      background: var(--pink-3);
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(214px, 260px) minmax(360px, 1fr) minmax(282px, 350px);
      gap: 14px;
      align-items: stretch;
    }

    .panel,
    .board-panel {
      min-height: 0;
      border: 2px solid var(--line);
      background: rgba(255, 250, 253, 0.94);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }

    .window-bar {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 9px;
      border-bottom: 2px solid var(--line);
      background: var(--pink-2);
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      text-transform: lowercase;
    }

    .window-buttons {
      display: flex;
      gap: 5px;
      flex: 0 0 auto;
    }

    .window-buttons span {
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--line);
      background: var(--white);
    }

    .scroll-area {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
    }

    .lesson-list {
      display: grid;
      gap: 8px;
    }

    .lesson-button {
      width: 100%;
      min-height: 54px;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 2px solid var(--line-soft);
      background: var(--white);
      text-align: left;
    }

    .lesson-button.is-active {
      border-color: var(--line);
      background: var(--pink-2);
    }

    .lesson-number {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 2px solid var(--line);
      background: var(--pink-3);
      font-family: "Silkscreen", monospace;
      font-size: 12px;
    }

    .lesson-name {
      display: block;
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      line-height: 1.2;
      text-transform: lowercase;
    }

    .lesson-status {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      line-height: 1.2;
    }

    .lesson-button.is-done .lesson-status::after {
      content: "done";
    }

    .lesson-button:not(.is-done) .lesson-status::after {
      content: "not done";
    }

    .stage-scroll {
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .macro-card,
    .micro-card,
    .bridge-card,
    .demo-card,
    .practice-card,
    .about-card {
      border: 2px solid var(--line);
      background: var(--white);
    }

    .macro-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 14px;
    }

    .eyebrow,
    .mini-label {
      margin: 0 0 7px;
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      text-transform: lowercase;
    }

    .macro-title,
    .micro-title,
    .view-title {
      margin: 0;
      font-family: "Silkscreen", monospace;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1;
      text-transform: lowercase;
    }

    .plain-text {
      margin: 10px 0 0;
      max-width: 64ch;
      font-size: 16px;
      line-height: 1.45;
    }

    .bridge-card {
      padding: 12px;
      background: var(--pink-1);
    }

    .bridge-card p,
    .demo-card p {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
    }

    .demo-card {
      padding: 12px;
      background: var(--white);
    }

    .demo-title {
      margin: 0 0 6px;
      font-family: "Silkscreen", monospace;
      font-size: 14px;
      line-height: 1;
      text-transform: lowercase;
    }

    .focus-toggle {
      min-height: 42px;
      padding: 8px 12px;
      border: 2px solid var(--line);
      background: var(--pink-2);
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .focus-toggle[aria-pressed="true"] {
      background: var(--pink-3);
    }

    .board-wrap {
      border: 2px solid var(--line);
      background: var(--pink-2);
      padding: clamp(10px, 1.8vw, 16px);
    }

    .board-frame {
      width: min(100%, 610px);
      margin: 0 auto;
      padding: clamp(15px, 2.6vw, 24px);
      border: 3px solid var(--line);
      border-radius: 20px;
      background: var(--pink-1);
      box-shadow: inset 0 0 0 5px rgba(255, 250, 253, 0.54);
    }

    .files {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      margin: 0 30px 10px;
      font-family: "Silkscreen", monospace;
      font-size: 14px;
      line-height: 1;
      text-align: center;
      text-transform: uppercase;
    }

    .board-row {
      display: grid;
      grid-template-columns: 30px 1fr 30px;
    }

    .ranks {
      display: grid;
      grid-template-rows: repeat(8, 1fr);
      align-items: center;
      justify-items: center;
      font-family: "Silkscreen", monospace;
      font-size: 14px;
      line-height: 1;
    }

    .board {
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border: 3px solid var(--line);
      background: var(--white);
    }

    .square {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      border: 0;
      padding: 0;
      background: var(--white);
      container-type: inline-size;
      overflow: hidden;
    }

    .square.dark {
      background: var(--pink-2);
    }

    .square.is-highlight,
    .square.is-target {
      box-shadow: inset 0 0 0 2px rgba(189, 103, 152, 0.42);
    }

    .square.is-found {
      box-shadow: inset 0 0 0 3px rgba(21, 16, 21, 0.56);
    }

    .square.is-selected {
      box-shadow: inset 0 0 0 3px var(--pink-5);
    }

    .piece {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 82%;
      height: 82%;
      color: var(--pink-3);
      font-family: "Arial Unicode MS", "Apple Symbols", "Noto Sans Symbols 2", "Times New Roman", serif;
      font-size: clamp(18px, 72cqw, 52px);
      font-weight: 900;
      line-height: 0.92;
      pointer-events: none;
      transform: scale(0.94);
      text-shadow:
        -0.55px -0.55px 0 rgba(21, 16, 21, 0.75),
        0.55px -0.55px 0 rgba(21, 16, 21, 0.75),
        -0.55px 0.55px 0 rgba(21, 16, 21, 0.75),
        0.55px 0.55px 0 rgba(21, 16, 21, 0.75),
        0 0.8px 0 rgba(21, 16, 21, 0.38);
      -webkit-text-stroke: 0.18px rgba(21, 16, 21, 0.75);
    }

    .piece.dark-piece {
      color: var(--pink-5);
    }

    .micro-card {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .step-meter {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .meter-track {
      height: 12px;
      border: 2px solid var(--line);
      background: var(--white);
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: var(--pink-4);
      transition: width 180ms ease;
    }

    .step-count {
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .micro-body {
      margin: 0;
      font-size: 17px;
      line-height: 1.45;
    }

    .feedback {
      min-height: 46px;
      display: flex;
      align-items: center;
      padding: 10px;
      border: 2px solid var(--line-soft);
      background: var(--pink-1);
      font-size: 15px;
      line-height: 1.35;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-row.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .small-button,
    .primary-button {
      min-height: 46px;
      border: 2px solid var(--line);
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      text-transform: lowercase;
    }

    .small-button {
      background: var(--white);
    }

    .primary-button {
      background: var(--pink-4);
    }

    .legend-grid {
      display: grid;
      gap: 8px;
    }

    .legend-card {
      width: 100%;
      min-height: 70px;
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 9px;
      align-items: center;
      padding: 8px;
      border: 2px solid var(--line-soft);
      background: var(--white);
      text-align: left;
    }

    .legend-card.is-active {
      background: var(--pink-2);
      border-color: var(--line);
    }

    .legend-symbol {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border: 2px solid var(--line);
      background: var(--pink-1);
      color: var(--pink-5);
      font-family: "Arial Unicode MS", "Apple Symbols", "Noto Sans Symbols 2", "Times New Roman", serif;
      font-size: 40px;
      font-weight: 900;
      line-height: 1;
      text-shadow:
        -0.5px -0.5px 0 rgba(21, 16, 21, 0.75),
        0.5px -0.5px 0 rgba(21, 16, 21, 0.75),
        -0.5px 0.5px 0 rgba(21, 16, 21, 0.75),
        0.5px 0.5px 0 rgba(21, 16, 21, 0.75);
      -webkit-text-stroke: 0.18px rgba(21, 16, 21, 0.75);
    }

    .legend-name {
      display: block;
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      text-transform: lowercase;
    }

    .legend-role {
      display: block;
      margin-top: 3px;
      font-size: 13px;
      line-height: 1.25;
    }

    .full-legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .full-legend .legend-card {
      min-height: 92px;
    }

    .practice-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .practice-card,
    .about-card {
      padding: 14px;
    }

    .version {
      margin: 12px 0 0;
      font-family: "Silkscreen", monospace;
      font-size: 12px;
    }

    .is-focus .rail-panel,
    .is-focus .legend-panel,
    .is-focus .bridge-card {
      display: none;
    }

    .is-focus .layout {
      grid-template-columns: minmax(360px, 1fr) minmax(282px, 350px);
    }

    .is-focus .board-panel {
      grid-column: 1;
    }

    .is-practice-clean .rail-panel {
      display: none;
    }

    .is-practice-clean .layout {
      grid-template-columns: minmax(360px, 1fr) minmax(282px, 350px);
    }

    .is-practice-clean .board-panel {
      grid-column: 1;
    }

    @media (max-width: 1040px) {
      .layout,
      .is-focus .layout,
      .is-practice-clean .layout {
        grid-template-columns: 1fr;
      }

      .rail-panel,
      .legend-panel {
        max-height: none;
      }

      .lesson-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .app-shell {
        padding-left: 10px;
        padding-right: 10px;
      }

      .topbar,
      .macro-card {
        grid-template-columns: 1fr;
      }

      .view-tabs {
        justify-content: start;
      }

      .progress-pill {
        justify-self: start;
      }

      .lesson-list,
      .full-legend {
        grid-template-columns: 1fr;
      }

      .stage-scroll {
        padding: 10px;
      }

      .board-frame {
        padding: 7px;
      }

      .files {
        margin-left: 20px;
        margin-right: 20px;
        font-size: 10px;
      }

      .board-row {
        grid-template-columns: 20px 1fr 20px;
      }

      .ranks {
        font-size: 10px;
      }

      .piece {
        font-size: clamp(18px, 72cqw, 38px);
      }

      .action-row,
      .action-row.three {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="app">
    <header class="topbar">
      <h1 class="brand">girl<br>chess</h1>
      <nav class="view-tabs" aria-label="Views">
        <button class="tab-button" type="button" data-view="learn">learn</button>
        <button class="tab-button" type="button" data-view="legend">legend</button>
        <button class="tab-button" type="button" data-view="practice">practice</button>
        <button class="tab-button" type="button" data-view="about">about</button>
      </nav>
      <div class="progress-pill" id="progressPill">0/12 done</div>
    </header>

    <main class="layout" id="layout">
      <aside class="panel rail-panel" aria-label="Lesson list">
        <div class="window-bar">
          <span>lessons</span>
          <span class="window-buttons"><span></span><span></span><span></span></span>
        </div>
        <div class="scroll-area">
          <div class="lesson-list" id="lessonList"></div>
        </div>
      </aside>

      <section class="board-panel" aria-label="Chess lesson">
        <div class="window-bar">
          <span id="stageLabel">lesson</span>
          <span class="window-buttons"><span></span><span></span><span></span></span>
        </div>
        <div class="scroll-area stage-scroll" id="stage"></div>
      </section>

      <aside class="panel legend-panel" aria-label="Coach and piece legend">
        <div class="window-bar">
          <span>coach</span>
          <span class="window-buttons"><span></span><span></span><span></span></span>
        </div>
        <div class="scroll-area" id="coach"></div>
      </aside>
    </main>
  </div>

  <script>
    const APP_VERSION = "Girl Chess v2.0";
    const STORAGE_KEY = "girl-chess-progress-v1";
    const FILES = ["a", "b", "c", "d", "e", "f", "g", "h"];
    const RANKS = [8, 7, 6, 5, 4, 3, 2, 1];

    const PIECES = [
      {
        id: "king",
        name: "king",
        symbol: "♚",
        role: "Protect this piece.",
        move: "Moves one square in any direction.",
        bridge: "This is the piece you protect."
      },
      {
        id: "queen",
        name: "queen",
        symbol: "♛",
        role: "Most powerful piece.",
        move: "Moves straight or slanted, any distance.",
        bridge: "If the queen has a clear line, she can go far."
      },
      {
        id: "rook",
        name: "rook",
        symbol: "♜",
        role: "Straight-line piece.",
        move: "Moves up, down, left, or right.",
        bridge: "Straight lines only."
      },
      {
        id: "bishop",
        name: "bishop",
        symbol: "♝",
        role: "Slanted-line piece.",
        move: "Moves only on slanted lines.",
        bridge: "Slanted lines only."
      },
      {
        id: "knight",
        name: "knight",
        symbol: "♞",
        role: "Jumping piece.",
        move: "Moves in an L shape: two, then one.",
        bridge: "Look for the L shape."
      },
      {
        id: "pawn",
        name: "pawn",
        symbol: "♟",
        role: "Small piece with special rules.",
        move: "Moves forward. Takes diagonally.",
        bridge: "Pawn rule: walk straight, take slanted."
      }
    ];

    const PIECE_BY_ID = Object.fromEntries(PIECES.map(piece => [piece.id, piece]));

    function p(square, piece, side) {
      return { square, piece, side };
    }

    const STARTING_POSITION = [
      p("a8", "rook", "dark"), p("b8", "knight", "dark"), p("c8", "bishop", "dark"), p("d8", "queen", "dark"),
      p("e8", "king", "dark"), p("f8", "bishop", "dark"), p("g8", "knight", "dark"), p("h8", "rook", "dark"),
      p("a7", "pawn", "dark"), p("b7", "pawn", "dark"), p("c7", "pawn", "dark"), p("d7", "pawn", "dark"),
      p("e7", "pawn", "dark"), p("f7", "pawn", "dark"), p("g7", "pawn", "dark"), p("h7", "pawn", "dark"),
      p("a2", "pawn", "soft"), p("b2", "pawn", "soft"), p("c2", "pawn", "soft"), p("d2", "pawn", "soft"),
      p("e2", "pawn", "soft"), p("f2", "pawn", "soft"), p("g2", "pawn", "soft"), p("h2", "pawn", "soft"),
      p("a1", "rook", "soft"), p("b1", "knight", "soft"), p("c1", "bishop", "soft"), p("d1", "queen", "soft"),
      p("e1", "king", "soft"), p("f1", "bishop", "soft"), p("g1", "knight", "soft"), p("h1", "rook", "soft")
    ];

    const POSITIONS = {
      start: STARTING_POSITION,
      empty: [],
      boardMap: [p("d4", "queen", "soft")],
      legend: STARTING_POSITION,
      pawns: [p("d2", "pawn", "soft"), p("e4", "pawn", "dark"), p("c3", "pawn", "dark"), p("e3", "pawn", "dark")],
      rooks: [p("d4", "rook", "soft"), p("d7", "pawn", "dark"), p("a4", "pawn", "dark"), p("d2", "pawn", "soft")],
      bishops: [p("d4", "bishop", "soft"), p("b6", "pawn", "dark"), p("f6", "pawn", "dark"), p("b2", "pawn", "soft")],
      queen: [p("d4", "queen", "soft"), p("d7", "pawn", "dark"), p("g7", "pawn", "dark"), p("a4", "pawn", "dark")],
      knight: [p("d5", "knight", "soft"), p("d6", "pawn", "soft"), p("e5", "pawn", "soft"), p("b6", "pawn", "dark"), p("f4", "pawn", "dark")],
      king: [p("e1", "king", "soft"), p("e8", "king", "dark"), p("e7", "rook", "soft"), p("a8", "rook", "dark")],
      mate: [p("h8", "king", "dark"), p("g7", "queen", "soft"), p("h6", "king", "soft")]
    };

    const LESSONS = [
      {
        id: "goal",
        title: "start here",
        label: "lesson 01: the goal",
        macroTitle: "how to win",
        macro: [
          "Chess is a game between two teams.",
          "Your team is soft pink. The other team is dark pink.",
          "You win by trapping the other king."
        ],

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return { ...defaultState, ...saved };
      } catch (error) {
        return { ...defaultState };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function currentLesson() {
      return LESSONS[state.lessonIndex] || LESSONS[0];
    }

    function currentStep() {
      const lesson = currentLesson();
      return lesson.steps[state.stepIndex] || lesson.steps[0];
    }

    function currentStepKey() {
      return `${currentLesson().id}:${state.stepIndex}`;
    }

    function getFoundSet(key = currentStepKey()) {
      return new Set(state.foundByStep[key] || []);
    }

    function setFoundSet(found, key = currentStepKey()) {
      state.foundByStep[key] = Array.from(found);
    }

    function currentAnswerWasShown(key = currentStepKey()) {
      return Boolean(state.answerShownByStep[key]);
    }

    function pieceAt(positionName, square) {
      return (POSITIONS[positionName] || []).find(item => item.square === square);
    }

    function isDarkSquare(fileIndex, rank) {
      const rankIndex = 8 - rank;
      return (fileIndex + rankIndex) % 2 === 1;
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isStepReady(step, found) {
      if (!step.targets || step.targets.length === 0) return true;
      if (step.completeMode === "one") return found.size >= 1;
      return step.targets.every(square => found.has(square));
    }

    function isStepPassed(step, found, key = currentStepKey()) {
      return isStepReady(step, found) && !currentAnswerWasShown(key);
    }

    function updateCompletedLesson() {
      const lesson = currentLesson();
      const allStepsReady = lesson.steps.every((step, index) => {
        const found = getFoundSet(`${lesson.id}:${index}`);
        return isStepPassed(step, found, `${lesson.id}:${index}`);
      });
      if (allStepsReady) {
        state.completedLessons[lesson.id] = true;
      }
    }

    function progressText() {
      const completed = LESSONS.filter(lesson => state.completedLessons[lesson.id]).length;
      return `${completed}/${LESSONS.length} done`;
    }

    function allLessonsPassed() {
      return LESSONS.every(lesson => state.completedLessons[lesson.id]);
    }

    function nextIncompleteLessonIndex() {
      const index = LESSONS.findIndex(lesson => !state.completedLessons[lesson.id]);
      return index === -1 ? 0 : index;
    }

    function lessonDemo(lesson) {
      return DEMOS[lesson.id] || {
        title: "demo",
        body: lesson.bridge,
        position: lesson.position,
        highlights: []
      };
    }

    function renderBoard(options) {
      const position = options.position || "start";
      const targets = new Set(options.targets || []);
      const highlights = new Set(options.highlights || []);
      const found = options.found || new Set();
      const selected = new Set(options.selected || []);
      const showTargets = Boolean(options.showTargets);

      const topFiles = `<div class="files">${FILES.map(file => `<span>${file}</span>`).join("")}</div>`;
      const rankLabels = `<div class="ranks">${RANKS.map(rank => `<span>${rank}</span>`).join("")}</div>`;
      const squares = [];

      for (const rank of RANKS) {
        FILES.forEach((file, fileIndex) => {
          const square = `${file}${rank}`;
          const piece = pieceAt(position, square);
          const classes = [
            "square",
            isDarkSquare(fileIndex, rank) ? "dark" : "light",
            showTargets && targets.has(square) ? "is-target" : "",
            highlights.has(square) ? "is-highlight" : "",
            found.has(square) ? "is-found" : "",
            selected.has(square) ? "is-selected" : ""
          ].filter(Boolean).join(" ");
          const pieceMarkup = piece
            ? `<span class="piece ${piece.side === "dark" ? "dark-piece" : "soft-piece"}" aria-hidden="true">${PIECE_BY_ID[piece.piece].symbol}</span>`
            : "";
          const label = piece
            ? `${square}, ${piece.side} ${PIECE_BY_ID[piece.piece].name}`
            : `${square}, empty`;
          squares.push(`<button class="${classes}" type="button" data-square="${square}" aria-label="${escapeHTML(label)}">${pieceMarkup}</button>`);
        });
      }

      return `
        <div class="board-wrap">
          <div class="board-frame">
            ${topFiles}
            <div class="board-row">
              ${rankLabels}
              <div class="board" aria-label="Chess board">${squares.join("")}</div>
              ${rankLabels}
            </div>
            ${topFiles}
          </div>
        </div>
      `;
    }

    function renderLessonList() {
      lessonList.innerHTML = LESSONS.map((lesson, index) => {
        const isActive = index === state.lessonIndex && state.view === "learn";
        const isDone = Boolean(state.completedLessons[lesson.id]);
        return `
          <button class="lesson-button ${isActive ? "is-active" : ""} ${isDone ? "is-done" : ""}" type="button" data-lesson="${index}">
            <span class="lesson-number">${String(index + 1).padStart(2, "0")}</span>
            <span>
              <span class="lesson-name">${escapeHTML(lesson.title)}</span>
              <span class="lesson-status"></span>
            </span>
          </button>
        `;
      }).join("");
    }

    function renderLegendCards(full = false) {
      return `
        <div class="${full ? "full-legend" : "legend-grid"}">
          ${PIECES.map(piece => `
            <button class="legend-card ${state.activeLegend === piece.id ? "is-active" : ""}" type="button" data-piece="${piece.id}">
              <span class="legend-symbol" aria-hidden="true">${piece.symbol}</span>
              <span>
                <span class="legend-name">${piece.name}</span>
                <span class="legend-role">${full ? `${piece.role} ${piece.move}` : piece.role}</span>
              </span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderLearn() {
      const lesson = currentLesson();
      const demo = lessonDemo(lesson);
      const step = currentStep();
      const key = currentStepKey();
      const found = getFoundSet(key);
      const answerShown = currentAnswerWasShown(key);
      const stepReady = isStepPassed(step, found, key);
      const meter = state.lessonMode === "demo"
        ? 0
        : ((state.stepIndex + (stepReady ? 1 : 0)) / lesson.steps.length) * 100;

      stageLabel.textContent = lesson.label;
      if (state.lessonMode === "demo") {
        stage.innerHTML = `
          <section class="macro-card">
            <div>
              <p class="eyebrow">big picture</p>
              <h2 class="macro-title">${escapeHTML(lesson.macroTitle)}</h2>
              ${lesson.macro.map(text => `<p class="plain-text">${escapeHTML(text)}</p>`).join("")}
            </div>
            <button class="focus-toggle" type="button" aria-pressed="${state.focusMode}" data-action="focus">
              ${state.focusMode ? "show all" : "focus"}
            </button>
          </section>
          <section class="bridge-card">
            <p><strong>what this means:</strong> ${escapeHTML(lesson.bridge)}</p>
          </section>
          <section class="demo-card">
            <h2 class="demo-title">${escapeHTML(demo.title)}</h2>
            <p>${escapeHTML(demo.body)}</p>
          </section>
          ${renderBoard({
            position: demo.position,
            highlights: demo.highlights
          })}
        `;

        coach.innerHTML = `
          <section class="micro-card">
            <div>
              <p class="eyebrow">watch first</p>
              <h2 class="micro-title">demo</h2>
              <p class="micro-body">Look at the highlighted squares. This is the idea before the test.</p>
            </div>
            <div class="feedback" role="status">${escapeHTML(state.feedback || "When this makes sense, start the test.")}</div>
            <div class="action-row">
              <button class="small-button" type="button" data-action="focus">${state.focusMode ? "show all" : "focus"}</button>
              <button class="primary-button" type="button" data-action="start-test">start test</button>
            </div>
          </section>
          <section class="micro-card">
            <p class="eyebrow">piece guide</p>
            ${renderLegendCards(false)}
          </section>
        `;
        return;
      }

      stage.innerHTML = `
        <section class="macro-card">
          <div>
            <p class="eyebrow">test</p>
            <h2 class="macro-title">${escapeHTML(lesson.macroTitle)}</h2>
            <p class="plain-text">Now answer without the board giving it away.</p>
          </div>
          <button class="focus-toggle" type="button" aria-pressed="${state.focusMode}" data-action="focus">
            ${state.focusMode ? "show all" : "focus"}
          </button>
        </section>
        ${renderBoard({
          position: lesson.position,
          targets: step.targets,
          found,
          selected: found,
          showTargets: answerShown
        })}
      `;

      coach.innerHTML = `
        <section class="micro-card">
          <div class="step-meter">
            <div class="meter-track" aria-hidden="true"><div class="meter-fill" style="width:${meter}%"></div></div>
            <span class="step-count">${state.stepIndex + 1}/${lesson.steps.length}</span>
          </div>
          <div>
            <p class="eyebrow">tiny step</p>
            <h2 class="micro-title">${escapeHTML(step.title)}</h2>
            <p class="micro-body">${escapeHTML(step.body)}</p>
          </div>
          <div class="feedback" role="status">${escapeHTML(state.feedback || step.prompt || "Tap the board when the step asks you to.")}</div>
          <div class="action-row three">
            <button class="small-button" type="button" data-action="back" ${state.stepIndex === 0 ? "disabled" : ""}>back</button>
            <button class="small-button" type="button" data-action="answer">show answer</button>
            <button class="primary-button" type="button" data-action="next" ${stepReady ? "" : "disabled"}>${state.stepIndex === lesson.steps.length - 1 ? "finish" : "next"}</button>
          </div>
          <button class="small-button" type="button" data-action="retry-step" ${found.size || answerShown ? "" : "disabled"}>reset question</button>
        </section>
        <section class="micro-card">
          <p class="eyebrow">piece guide</p>
          ${renderLegendCards(false)}
        </section>
      `;
    }

    function renderLegendView() {
      stageLabel.textContent = "piece guide";
      const active = PIECE_BY_ID[state.activeLegend] || PIECES[0];
      stage.innerHTML = `
        <section class="macro-card">
          <div>
            <p class="eyebrow">big picture</p>
            <h2 class="macro-title">the chess set</h2>
            <p class="plain-text">Both teams have the same six kinds of pieces. Learn the shape first, then the move.</p>
            <p class="plain-text">Start by recognizing what each piece looks like. You do not need strategy yet.</p>
          </div>
        </section>
        <section class="practice-card">
          <p class="eyebrow">tap a piece</p>
          ${renderLegendCards(true)}
        </section>
      `;
      coach.innerHTML = `
        <section class="micro-card">
          <p class="eyebrow">selected piece</p>
          <h2 class="micro-title">${escapeHTML(active.name)}</h2>
          <p class="micro-body">${escapeHTML(active.role)}</p>
          <p class="plain-text">${escapeHTML(active.move)}</p>
          <div class="feedback">${escapeHTML(active.bridge)}</div>
        </section>
        <section class="micro-card">
          <p class="eyebrow">quick rule</p>
          <p class="micro-body">An allowed move means the piece is allowed to go there, and your king is still safe after.</p>
        </section>
      `;
    }

    function renderPractice() {
      if (!allLessonsPassed()) {
        const nextIndex = nextIncompleteLessonIndex();
        const nextLesson = LESSONS[nextIndex];
        stageLabel.textContent = "practice locked";
        stage.innerHTML = `
          <section class="about-card">
            <p class="eyebrow">locked</p>
            <h2 class="view-title">practice unlocks after lessons</h2>
            <p class="plain-text">Finish each lesson demo and pass its test. Then the practice rounds open.</p>
            <p class="plain-text">Next lesson to pass: ${escapeHTML(nextLesson.label)}.</p>
          </section>
        `;
        coach.innerHTML = `
          <section class="micro-card">
            <p class="eyebrow">next step</p>
            <h2 class="micro-title">${escapeHTML(nextLesson.title)}</h2>
            <p class="micro-body">Go back to lessons and pass this test first.</p>
            <button class="primary-button" type="button" data-action="go-needed-lesson">go to lesson</button>
          </section>
        `;
        return;
      }

      const item = PRACTICE[state.practiceIndex] || PRACTICE[0];
      const key = `practice:${state.practiceIndex}`;
      const found = getFoundSet(key);
      const ready = isStepReady(item, found);
      const showTargets = state.practiceShowAnswer;

      stageLabel.textContent = "practice";
      stage.innerHTML = `
        ${renderBoard({
          position: item.position,
          targets: item.targets,
          found,
          selected: found,
          showTargets
        })}
      `;

      coach.innerHTML = `
        <section class="micro-card">
          <p class="eyebrow">practice ${state.practiceIndex + 1}/${PRACTICE.length}</p>
          <h2 class="micro-title">${escapeHTML(item.title)}</h2>
          <p class="micro-body">${escapeHTML(item.body)}</p>
          <div class="feedback" role="status">${escapeHTML(state.feedback || "Tap the answer on the board.")}</div>
          <div class="action-row three">
            <button class="small-button" type="button" data-action="practice-reset">reset</button>
            <button class="small-button" type="button" data-action="practice-answer">${state.practiceShowAnswer ? "hide answer" : "show answer"}</button>
            <button class="primary-button" type="button" data-action="practice-next" ${ready ? "" : "disabled"}>next</button>
          </div>
          <button class="small-button" type="button" data-action="toggle-practice-clean">${state.practiceClean ? "show guide" : "hide guide"}</button>
        </section>
        ${state.practiceClean ? "" : `
          <section class="micro-card">
            <p class="eyebrow">piece guide</p>
            ${renderLegendCards(false)}
          </section>
        `}
      `;
    }

    function renderAbout() {
      stageLabel.textContent = "about";
      stage.innerHTML = `
        <section class="about-card">
          <p class="eyebrow">about</p>
          <h2 class="view-title">girl chess</h2>
          <p class="plain-text">A soft pink chess tutor for total beginners.</p>
          <p class="plain-text">The app teaches in two layers: the whole idea first, then one small action at a time.</p>
          <p class="version">${APP_VERSION}<br>Built for April Korto Quioh</p>
        </section>
      `;
      coach.innerHTML = `
        <section class="micro-card">
          <p class="eyebrow">storage</p>
          <p class="micro-body">Progress saves on this device.</p>
          <button class="small-button" type="button" data-action="reset-progress">reset progress</button>
        </section>
      `;
    }

    function render() {
      app.classList.toggle("is-focus", state.focusMode && state.view === "learn");
      app.classList.toggle("is-practice-clean", state.practiceClean && state.view === "practice" && allLessonsPassed());
      progressPill.textContent = progressText();
      document.querySelectorAll(".tab-button").forEach(button => {
        button.setAttribute("aria-pressed", String(button.dataset.view === state.view));
      });
      renderLessonList();
      if (state.view === "learn") renderLearn();
      if (state.view === "legend") renderLegendView();
      if (state.view === "practice") renderPractice();
      if (state.view === "about") renderAbout();
      saveState();
    }

    function handleSquare(square) {
      if (state.view === "learn") {
        const lesson = currentLesson();
        const step = currentStep();
        const found = getFoundSet();
        if (!step.targets || step.targets.length === 0) {
          state.feedback = "No tap needed here. Press next.";
          render();
          return;
        }
        if (step.targets.includes(square)) {
          found.add(square);
          setFoundSet(found);
          if (currentAnswerWasShown()) {
            state.feedback = "That is the answer. Reset this question and do it without showing the answer to pass.";
          } else {
            state.feedback = isStepReady(step, found) ? step.success : "Good. Find the next one.";
          }
          updateCompletedLesson();
        } else {
          state.feedback = "Not that square. Try again.";
        }
        render();
        return;
      }

      if (state.view === "practice") {
        const item = PRACTICE[state.practiceIndex] || PRACTICE[0];
        const key = `practice:${state.practiceIndex}`;
        const found = getFoundSet(key);
        if (item.targets.includes(square)) {
          found.add(square);
          setFoundSet(found, key);
          state.feedback = isStepReady(item, found) ? "Correct." : "Good. Keep going.";
        } else {
          state.feedback = "Not that square yet. Try again.";
        }
        render();
      }
    }

    function showAnswer() {
      const step = currentStep();
      state.answerShownByStep[currentStepKey()] = true;
      state.feedback = step.targets && step.targets.length
        ? `Answer shown: ${step.targets.join(", ")}. Reset this question to pass it.`
        : "No board tap is needed here.";
      render();
    }

    function goNext() {
      const lesson = currentLesson();
      const step = currentStep();
      const found = getFoundSet();
      if (!isStepPassed(step, found)) {
        state.feedback = currentAnswerWasShown()
          ? "Reset this question and answer without showing it to pass."
          : "Answer this question first.";
        render();
        return;
      }
      if (state.stepIndex < lesson.steps.length - 1) {
        state.stepIndex += 1;
        state.feedback = "";
      } else {
        state.completedLessons[lesson.id] = true;
        if (state.lessonIndex < LESSONS.length - 1) {
          state.lessonIndex += 1;
          state.stepIndex = 0;
          state.lessonMode = "demo";
          state.feedback = "Next lesson loaded.";
        } else {
          state.feedback = "Lesson path complete.";
        }
      }
      render();
    }

    function goBack() {
      if (state.stepIndex > 0) {
        state.stepIndex -= 1;
        state.feedback = "";
        render();
      }
    }

    document.addEventListener("click", event => {
      const squareButton = event.target.closest("[data-square]");
      if (squareButton) {
        handleSquare(squareButton.dataset.square);
        return;
      }

      const lessonButton = event.target.closest("[data-lesson]");
      if (lessonButton) {
        state.view = "learn";
        state.lessonIndex = Number(lessonButton.dataset.lesson);
        state.stepIndex = 0;
        state.lessonMode = "demo";
        state.feedback = "";
        render();
        return;
      }

      const viewButton = event.target.closest("[data-view]");
      if (viewButton) {
        state.view = viewButton.dataset.view;
        if (state.view === "learn") state.lessonMode = state.lessonMode || "demo";
        if (state.view === "practice") state.practiceShowAnswer = false;
        state.feedback = "";
        render();
        return;
      }

      const pieceButton = event.target.closest("[data-piece]");
      if (pieceButton) {
        state.activeLegend = pieceButton.dataset.piece;
        render();
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (!actionButton) return;
      const action = actionButton.dataset.action;

      if (action === "focus") {
        state.focusMode = !state.focusMode;
        render();
      }
      if (action === "start-test") {
        state.lessonMode = "quiz";
        state.feedback = "";
        render();
      }
      if (action === "back") goBack();
      if (action === "answer") showAnswer();
      if (action === "next") goNext();
      if (action === "retry-step") {
        const key = currentStepKey();
        state.foundByStep[key] = [];
        state.answerShownByStep[key] = false;
        state.feedback = "";
        render();
      }
      if (action === "practice-reset") {
        state.foundByStep[`practice:${state.practiceIndex}`] = [];
        state.practiceShowAnswer = false;
        state.feedback = "";
        render();
      }
      if (action === "practice-answer") {
        state.practiceShowAnswer = !state.practiceShowAnswer;
        state.feedback = state.practiceShowAnswer ? "Answer is showing." : "";
        render();
      }
      if (action === "practice-next") {
        state.practiceIndex = (state.practiceIndex + 1) % PRACTICE.length;
        state.practiceShowAnswer = false;
        state.feedback = "";
        render();
      }
      if (action === "toggle-practice-clean") {
        state.practiceClean = !state.practiceClean;
        render();
      }
      if (action === "go-needed-lesson") {
        state.view = "learn";
        state.lessonIndex = nextIncompleteLessonIndex();
        state.stepIndex = 0;
        state.lessonMode = "demo";
        state.feedback = "";
        render();
      }
      if (action === "reset-progress") {
        state = { ...defaultState };
        localStorage.removeItem(STORAGE_KEY);
        render();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }

    render();
  </script>
</body>
</html>
