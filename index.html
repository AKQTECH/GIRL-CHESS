        `;

        coach.innerHTML = `
          <section class="micro-card">
            <div>
              <p class="eyebrow">watch first</p>
              <h2 class="micro-title">demo</h2>
            <p class="micro-body">Just looking. Nothing to get right yet. Look at the map and highlighted squares before the test.</p>
            </div>

            <div class="action-row">
              <button class="small-button" type="button" data-action="focus">${state.focusMode ? "show all" : "focus"}</button>
              <button class="primary-button" type="button" data-action="start-test">start test</button>
            </div>
          </section>
          <section class="micro-card">
            <p class="eyebrow">piece guide</p>
            ${renderLegendCards(false)}
          </section>
        `;
        return;

      stage.innerHTML = `
        <section class="macro-card">
          <div>
            <p class="eyebrow">test</p>
            <h2 class="macro-title">${escapeHTML(lesson.macroTitle)}</h2>
            <p class="plain-text">Now answer without the board giving it away.</p>

          targets: step.targets,

          showTargets: answerShown
        })}

      coach.innerHTML = `
        <section class="micro-card">
          <div class="step-meter">
            <div class="meter-track" aria-hidden="true"><div class="meter-fill" style="width:${meter}%"></div></div>
            <span class="step-count">${state.stepIndex + 1}/${lesson.steps.length}</span>
          </div>
          <div>
            <p class="eyebrow">tiny step</p>
            <h2 class="micro-title">${escapeHTML(step.title)}</h2>
            <p class="micro-body">${escapeHTML(bodyText)}</p>
          </div>
          <div class="feedback" role="status">${escapeHTML(state.feedback || step.prompt || "Tap the board when the step asks you to.")}</div>
          <div class="action-row three">
            <button class="small-button" type="button" data-action="back" ${state.stepIndex === 0 ? "disabled" : ""}>back</button>
            <button class="small-button" type="button" data-action="answer">${answerShown ? "hide answer" : "show answer"}</button>
            <button class="primary-button" type="button" data-action="next" ${stepReady ? "" : "disabled"}>${state.stepIndex === lesson.steps.length - 1 ? "finish" : "next"}</button>
          </div>
          <button class="small-button" type="button" data-action="retry-step" ${found.size || answerShown || revealed.size ? "" : "disabled"}>reset question</button>
        </section>
        <section class="micro-card">
          <p class="eyebrow">piece guide</p>
          ${renderLegendCards(false)}
        </section>
      `;
    }

    function renderLegendView() {
      stageLabel.textContent = "legend";
      stage.innerHTML = `
        <section class="macro-card">
          <div>
            <p class="eyebrow">piece reference</p>
            <h2 class="macro-title">your pieces</h2>

      stageLabel.textContent = "practice";
      stage.innerHTML = `
        ${renderBoard({

          targets: item.targets,
          highlights: revealed,

      coach.innerHTML = `
        <section class="micro-card">
          <p class="eyebrow">practice ${state.practiceIndex + 1}/${PRACTICE.length}</p>
          <h2 class="micro-title">${escapeHTML(item.title)}</h2>
          <p class="micro-body">${escapeHTML(bodyText)}</p>
          <div class="feedback" role="status">${escapeHTML(state.feedback || "Tap the answer on the board.")}</div>
          <div class="action-row three">
            <button class="small-button" type="button" data-action="practice-reset">reset</button>
            <button class="small-button" type="button" data-action="practice-answer">${state.practiceShowAnswer ? "hide answer" : "show answer"}</button>
            <button class="primary-button" type="button" data-action="practice-next" ${ready ? "" : "disabled"}>next</button>
          </div>
          <button class="small-button" type="button" data-action="toggle-practice-clean">${state.practiceClean ? "show guide" : "hide guide"}</button>
        </section>
        ${state.practiceClean ? "" : `
          <section class="micro-card">
            <p class="eyebrow">piece guide</p>
            ${renderLegendCards(false)}
          </section>
        `}
      `;
    }

    function renderAbout() {
      stageLabel.textContent = "about";
      stage.innerHTML = `
        <section class="about-card">
          <p class="eyebrow">about</p>
          <h2 class="view-title">girl chess</h2>
          <p class="plain-text">A soft pink chess tutor for total beginners.</p>
          <p class="plain-text">The app teaches in two layers: the whole idea first, then one small action at a time.</p>
          <p class="version">${APP_VERSION}<br>Built for April Korto Quioh</p>
        </section>
        ${renderAboutPanel()}
      `;
    }

    function renderPromotionChooser() {
      return `
        <section class="micro-card">
          <p class="eyebrow">promotion</p>
          <h2 class="micro-title">choose the new piece</h2>
          <p class="micro-body">Queen is the usual beginner choice.</p>
          <div class="promotion-row">
            ${["queen", "rook", "bishop", "knight"].map(piece => `
              <button class="${piece === "queen" ? "primary-button" : "small-button"}" type="button" data-action="promote-choice" data-piece-choice="${piece}">
                ${piece}
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderPlay() {
      if (!allLessonsPassed()) {
        const nextIndex = nextIncompleteLessonIndex();
        const nextLesson = LESSONS[nextIndex];
        layout.classList.remove("coach-off");
        stageLabel.textContent = "play locked";
        stage.innerHTML = `
          <section class="about-card">
            <p class="eyebrow">locked</p>
            <h2 class="view-title">play unlocks after lessons</h2>
            <p class="plain-text">Finish the lesson path first. Then you can practice inside a real game.</p>
            <p class="plain-text">Next lesson to pass: ${escapeHTML(nextLesson.label)}.</p>
          </section>
        `;
        coach.innerHTML = `
          <section class="micro-card">
            <p class="eyebrow">next step</p>
            <h2 class="micro-title">${escapeHTML(nextLesson.title)}</h2>
            <p class="micro-body">Go back to lessons and pass this test first.</p>
            <button class="primary-button" type="button" data-action="go-needed-lesson">go to lesson</button>
          </section>
        `;
        return;
      }

      const play = ensurePlayState();
      layout.classList.toggle("coach-off", !play.coachOn && !play.result && !state.upgradePrompt);
      const selected = play.selected ? new Set([play.selected]) : new Set();
      const highlights = new Set(play.hintSquares || []);
      stageLabel.textContent = "play";
      stage.innerHTML = `
        <section class="macro-card">
          <div>
            <p class="eyebrow">real game</p>
            <h2 class="macro-title">${play.turn === "soft" ? "your move" : "bot move"}</h2>
            <p class="plain-text">${escapeHTML(play.message || play.status)}</p>
          </div>
          <button class="focus-toggle" type="button" aria-pressed="${play.coachOn}" data-action="play-coach-toggle">
            ${play.coachOn ? "coach off" : "coach on"}
          </button>
        </section>
        ${renderBoard({
          positionItems: play.position,
          selected,
          legal: [],
          highlights,
          lastMove: []
        })}
        ${play.pendingPromotion ? renderPromotionChooser() : ""}
      `;

      if (!play.coachOn && !play.result && !state.upgradePrompt) {
        coach.innerHTML = "";
        return;
      }

      coach.innerHTML = `
        ${renderUpgradeCard()}
        ${play.result ? `
          <section class="micro-card">
            <p class="eyebrow">game over</p>
            <h2 class="micro-title">${play.result === "soft" ? "you won" : play.result === "bot" ? "bot won" : "draw"}</h2>
            <p class="micro-body">${escapeHTML(play.status)}</p>
            <button class="primary-button" type="button" data-action="play-new">new game</button>
          </section>
        ` : ""}
        ${play.coachOn ? `<section class="micro-card">
          <p class="eyebrow">coach</p>
          <h2 class="micro-title">${play.askMode ? "ask mode on" : "on demand"}</h2>
          <p class="micro-body">${escapeHTML(play.coachMessage || "Use hints only when you want them. Ask mode lets you tap any piece to ask what it does.")}</p>
          <div class="feedback" role="status">${escapeHTML(play.status)}</div>
          <div class="play-controls">
            <button class="primary-button" type="button" data-action="play-hint" ${play.turn !== "soft" || play.result ? "disabled" : ""}>
              ${play.hintLevel ? `hint ${Math.min(play.hintLevel + 1, 3)}` : "hint"}
            </button>
            <button class="small-button" type="button" data-action="play-ask" aria-pressed="${play.askMode}">
              ${play.askMode ? "move mode" : "ask mode"}
            </button>
            <button class="small-button" type="button" data-action="play-new">new game</button>
          </div>
        </section>` : ""}
        ${play.pendingPromotion ? renderPromotionChooser() : ""}
        ${play.coachOn ? `<section class="micro-card">
          <p class="eyebrow">tiny reminder</p>
          <p class="micro-body">Tap your piece first. Then pick the square you want. The board stays clean unless you ask for a hint.</p>
        </section>` : ""}
      `;
    }

    function render() {
      app.classList.toggle("is-focus", state.focusMode && state.view === "lessons");
      app.classList.toggle("is-practice-clean", state.practiceClean && state.view === "practice" && allLessonsPassed());
      document.querySelectorAll(".tab-button").forEach(button => {
        button.setAttribute("aria-pressed", String(button.dataset.view === state.view));
      });
      if (state.view === "lessons") {
        setScaffold("lessons-layout");
        renderLessonList();
        renderLearn();
      }
      if (state.view === "legend") {
        setScaffold("single-panel-layout");
        renderLegendView();
      }
      if (state.view === "practice") {
        setScaffold("two-panel-layout");
        renderPractice();
      }
      if (state.view === "play") {
        setScaffold("play-layout");
        renderPlay();
      }
      if (state.view === "about") {
        setScaffold("single-panel-layout");
        renderAbout();
      }
      renderAboutFooter();
      saveState();
    }

    function queueBotMove() {
      clearBotMove();
      const play = ensurePlayState();
      if (play.turn !== "dark" || play.result) return;
      play.busy = true;
      play.message = "Bot is thinking.";
      render();
      botTimer = window.setTimeout(() => {
        botTimer = null;
        const current = ensurePlayState();
        if (current.turn !== "dark" || current.result) return;
        const move = chooseBotMove(current);
        if (!move) {
          state.play = updatePlayStatus({ ...current, busy: false });
        } else {
          state.play = applyGameMoveSnapshot({ ...current, busy: false }, move, "queen");
          state.play.message = `Bot moved ${describeMove(move)}.`;
        }
        render();
      }, 520);
    }

    function completePlayMove(move, promotionChoice = "queen") {
      clearHintFlash();
      const play = ensurePlayState();
      state.play = applyGameMoveSnapshot(play, move, promotionChoice);
      state.play.message = move.castle
        ? "You castled. The king slid toward the rook, and the rook tucked beside him."
        : `You moved ${describeMove({ ...move, piece: promotionChoice === "queen" && move.piece === "pawn" && Number(move.to[1]) === 8 ? "queen" : move.piece })}.`;
      if (state.play.result === "soft") recordSoftWin();
      render();
      queueBotMove();
    }

    function handlePlaySquare(square) {
      const play = ensurePlayState();
      if (play.pendingPromotion) {
        play.message = "Choose the promotion piece first.";
        render();
        return;
      }
      if (play.result) {
        play.message = play.status;
        render();
        return;
      }
      if (play.turn !== "soft" || play.busy) {
        play.message = "Wait for the bot move to finish.";
        render();
        return;
      }

      const tappedPiece = pieceAtSquare(play.position, square);
      if (play.coachOn && play.askMode) {
        const answer = describePieceForCoach(play, square);
        play.coachMessage = answer.message;
        play.message = "Coach answered. Ask another piece, or switch back to move mode.";
        if (answer.squares.length) {
          startHintFlash([square, ...answer.squares]);
        } else {
          play.hintSquares = [];
        }
        if (!answer.squares.length) render();
        return;
      }

      if (play.selected) {
        const legalMoves = legalGameMovesForSquare(play, play.selected);
        const move = legalMoves.find(item => item.to === square);
        if (move) {
          if (moveNeedsPromotion(play, move)) {
            play.pendingPromotion = move;
            play.message = "Your pawn reached the last row. Choose what it becomes.";
            play.legal = [move.to];
            render();
            return;
          }
          completePlayMove(move);
          return;
        }
        if (tappedPiece && tappedPiece.side === "soft") {
          const nextMoves = legalGameMovesForSquare(play, square);
          play.selected = square;
          play.legal = nextMoves.map(item => item.to);
          play.hintSquares = [];
          play.message = nextMoves.length
            ? `${PIECE_BY_ID[tappedPiece.piece].name} selected. Pick the square you want.`
            : "That piece has no legal move right now.";
          render();
          return;
        }
        play.message = explainIllegalMove(play, play.selected, square);
        render();
        return;
      }

      if (!tappedPiece) {
        play.message = "Pick a soft pink piece first.";
        render();
        return;
      }
      if (tappedPiece.side !== "soft") {
        play.message = "That is dark pink. Pick a soft pink piece.";
        render();
        return;
      }
      const legalMoves = legalGameMovesForSquare(play, square);
      play.selected = square;
      play.legal = legalMoves.map(item => item.to);
      play.hintSquares = [];
      play.message = legalMoves.length
        ? `${PIECE_BY_ID[tappedPiece.piece].name} selected. Pick the square you want.`
        : "That piece has no legal move right now.";
      render();
    }

    function handleSquare(square) {
      clearFlashFeedback();
      if (state.view === "lessons") {
        const lesson = currentLesson();
        const step = currentStep();
        const key = currentStepKey();
        const found = getFoundSet(key);
        if (!step.targets || step.targets.length === 0) {
          state.feedback = "No tap needed here. Press next.";
          render();
          return;
        }
        if (step.targets.includes(square)) {
          found.add(square);
          setFoundSet(found, key);
          if (currentAnswerWasShown()) {
            state.feedback = "That is the answer. Reset this question and do it without showing the answer to pass.";
          } else {
            state.missCounts[key] = 0;
            const ready = isStepReady(step, found);
            setRevealSet(ready ? answerFamilyForItem(step) : [], key);
            state.feedback = ready ? correctFeedback(step, square) : "Good. Find the next one.";
          }
          updateCompletedLesson();
        } else {
          state.missCounts[key] = (state.missCounts[key] || 0) + 1;
          flashFeedback("No, not that one.", promptFor(step));
          return;
        }
        render();
        return;
      }

      if (state.view === "practice") {
        const item = PRACTICE[state.practiceIndex] || PRACTICE[0];
        const key = `practice:${state.practiceIndex}`;
        const found = getFoundSet(key);
        if (item.targets.includes(square)) {
          found.add(square);
          setFoundSet(found, key);
          state.missCounts[key] = 0;
          const ready = isStepReady(item, found);
          setRevealSet(ready ? answerFamilyForItem(item) : [], key);
          state.feedback = ready ? correctFeedback(item, square) : "Good. Keep going.";
        } else {
          state.missCounts[key] = (state.missCounts[key] || 0) + 1;
          flashFeedback("No, not that one.", promptFor(item, "Tap the answer on the board."));
          return;
        }
        render();
        return;
      }

      if (state.view === "play") {
        handlePlaySquare(square);
      }
    }

    function showAnswer() {
      const step = currentStep();
      const key = currentStepKey();
      if (currentAnswerWasShown(key)) {
        clearQuestionState(key);
        state.feedback = "";
        render();
        return;
      }
      state.answerShownByStep[key] = true;
      state.revealedByStep[key] = [];
      state.foundByStep[key] = [];
      state.feedback = step.targets && step.targets.length
        ? `Answer shown: ${step.targets.join(", ")}. Reset this question to pass it.`
        : "No board tap is needed here.";
      render();
    }

    function goNext() {
      const lesson = currentLesson();
      const step = currentStep();
      const found = getFoundSet();
      if (!isStepPassed(step, found)) {
        state.feedback = currentAnswerWasShown()
          ? "Reset this question and answer without showing it to pass."
          : "Answer this question first.";
        render();
        return;
      }
      if (state.stepIndex < lesson.steps.length - 1) {
        state.stepIndex += 1;
        state.feedback = "";
        clearQuestionState(currentStepKey());
      } else {
        state.completedLessons[lesson.id] = true;
        clearAllTransient();
        if (state.lessonIndex < LESSONS.length - 1) {
          state.lessonIndex += 1;
          state.stepIndex = 0;
          state.lessonMode = "demo";
          state.feedback = "Next lesson loaded.";
        } else {
          state.lessonMode = "complete";
          state.feedback = "Lesson path complete.";
        }
      }
      render();
    }

    function goBack() {
      if (state.stepIndex > 0) {
        state.stepIndex -= 1;
        state.feedback = "";
        clearQuestionState(currentStepKey());
        render();
      }
    }

    document.addEventListener("click", event => {
      const squareButton = event.target.closest("[data-square]");
      if (squareButton) {
        handleSquare(squareButton.dataset.square);
        return;
      }

      const lessonButton = event.target.closest("[data-lesson]");
      if (lessonButton) {
        clearFlashFeedback();
        clearAllTransient();
        state.view = "lessons";
        state.lessonIndex = Number(lessonButton.dataset.lesson);
        state.stepIndex = 0;
        state.lessonMode = "demo";
        state.feedback = "";
        render();
        scrollStageIntoView();
        return;
      }

      const viewButton = event.target.closest("[data-view]");
      if (viewButton) {
        clearFlashFeedback();
        clearHintFlash();
        clearAllTransient();
        state.view = viewButton.dataset.view;
        if (state.view === "lessons") {
          state.lessonMode = state.lessonMode === "complete" ? "demo" : state.lessonMode || "demo";
        }
        if (state.view === "practice") clearPracticeItem(state.practiceIndex);
        if (state.view === "play") ensurePlayState();
        state.feedback = "";
        render();
        return;
      }

      const pieceButton = event.target.closest("[data-piece]");
      if (pieceButton) {
        clearFlashFeedback();
        state.activeLegend = pieceButton.dataset.piece;
        render();
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (!actionButton) return;
      clearFlashFeedback();
      const action = actionButton.dataset.action;

      if (action === "focus") {
        state.focusMode = !state.focusMode;
        render();
      }
      if (action === "advanced-legend") {
        state.legendAdvanced = !state.legendAdvanced;
        render();
      }
      if (action === "open-about") {
        clearAllTransient();
        clearHintFlash();
        state.view = "about";
        state.aboutOpenPanel = "";
        state.feedback = "";
        render();
      }
      if (action === "start-test") {
        state.lessonMode = "quiz";
        state.feedback = "";
        clearQuestionState(currentStepKey());
        render();
      }
      if (action === "back") goBack();
      if (action === "answer") showAnswer();
      if (action === "next") goNext();
      if (action === "retry-step") {
        clearQuestionState(currentStepKey());
        state.feedback = "";
        render();
      }
      if (action === "practice-reset") {
        clearPracticeItem(state.practiceIndex);
        state.feedback = "";
        render();
      }
      if (action === "practice-answer") {
        if (state.practiceShowAnswer) {
          clearPracticeItem(state.practiceIndex);
          state.feedback = "";
        } else {
          const key = `practice:${state.practiceIndex}`;
          state.foundByStep[key] = [];
          state.revealedByStep[key] = [];
          state.practiceShowAnswer = true;
          state.feedback = "Answer is showing.";
        }
        render();
      }
      if (action === "practice-next") {
        clearPracticeItem(state.practiceIndex);
        state.practiceIndex = (state.practiceIndex + 1) % PRACTICE.length;
        clearPracticeItem(state.practiceIndex);
        state.feedback = "";
        render();
      }
      if (action === "toggle-practice-clean") {
        state.practiceClean = !state.practiceClean;
        render();
      }
      if (action === "go-needed-lesson") {
        clearAllTransient();
        state.view = "lessons";
        state.lessonIndex = nextIncompleteLessonIndex();
        state.stepIndex = 0;
        state.lessonMode = "demo";
        state.feedback = "";
        render();
        scrollStageIntoView();
      }
      if (action === "go-practice") {
        clearAllTransient();
        state.view = "practice";
        state.practiceIndex = 0;
        render();
      }
      if (action === "go-play") {
        clearAllTransient();
        state.view = "play";
        ensurePlayState();
        render();
      }
      if (action === "review-lessons") {
        clearAllTransient();
        clearHintFlash();
        state.view = "lessons";
        state.lessonIndex = Math.min(state.lessonIndex || 0, LESSONS.length - 1);
        state.stepIndex = 0;
        state.lessonMode = "demo";
        state.feedback = "";
        render();
        scrollStageIntoView();
      }
      if (action === "mark-all-lessons-complete") {
        LESSONS.forEach(lesson => {
          state.completedLessons[lesson.id] = true;
        });
        state.lessonMode = state.view === "lessons" ? "complete" : state.lessonMode;
        state.aboutOpenPanel = "lesson-recovery";
        state.feedback = "Lessons marked done.";
        render();
      }
      if (action === "toggle-lesson-complete") {
        const lessonId = actionButton.dataset.lessonId;
        if (LESSONS.some(lesson => lesson.id === lessonId)) {
          if (state.completedLessons[lessonId]) {
            delete state.completedLessons[lessonId];
            if (state.lessonMode === "complete") state.lessonMode = "demo";
          } else {
            state.completedLessons[lessonId] = true;
          }
          state.aboutOpenPanel = "lesson-recovery";
          state.feedback = "Lesson recovery updated.";
          render();
        }
      }
      if (action === "set-difficulty") {
        const level = actionButton.dataset.difficulty;
        if (DIFFICULTIES.includes(level)) {
          state.difficulty = level;
          state.upgradePrompt = false;
          state.resetConfirm = false;
          render();
        }
      }
      if (action === "upgrade-difficulty") {
        const next = nextDifficulty();
        if (next) {
          clearBotMove();
          clearHintFlash();
          state.difficulty = next;
          state.upgradePrompt = false;
          state.play = newPlayState();
          state.view = "play";
          render();
        }
      }
      if (action === "dismiss-upgrade") {
        state.upgradePrompt = false;
        render();
      }
      if (action === "play-new") {
        clearBotMove();
        clearHintFlash();
        state.play = newPlayState();
        render();
      }
      if (action === "play-coach-toggle") {
        clearHintFlash();
        const play = ensurePlayState();
        play.coachOn = !play.coachOn;
        play.askMode = false;
        play.coachMessage = "";
        play.hintSquares = [];
        render();
      }
      if (action === "play-hint") {
        const play = ensurePlayState();
        const flashSquares = applyCoachHint(play);
        if (flashSquares.length) {
          startHintFlash(flashSquares, {
            clearCoachMessage: true,
            restoreCoachMessage: "The flash is gone. Try the move from memory."
          });
        } else {
          render();
        }
      }
      if (action === "play-ask") {
        clearHintFlash();
        const play = ensurePlayState();
        play.askMode = !play.askMode;
        play.hintSquares = [];
        play.coachMessage = play.askMode
          ? "Tap any piece to ask what it does."
          : "Move mode is back on.";
        render();
      }
      if (action === "promote-choice") {
        const play = ensurePlayState();
        const move = play.pendingPromotion;
        if (move) completePlayMove(move, actionButton.dataset.pieceChoice || "queen");
      }
      if (action === "reset-progress") {
        if (!state.resetConfirm) {
          state.resetConfirm = true;
          state.aboutOpenPanel = "reset-options";
          render();
          return;
        }
        clearBotMove();
        clearHintFlash();
        localStorage.removeItem(STORAGE_KEY);
        state = {
          ...defaultState,
          completedLessons: {},
          foundByStep: {},
          answerShownByStep: {},
          revealedByStep: {},
          missCounts: {},
          winsByDifficulty: { easy: 0, normal: 0, hard: 0 },
          play: null
        };
        render();
      }
    });

    window.__GIRL_CHESS_TESTS__ = {
      legalDestinations,
      legalGameMovesForSquare,
      allLegalGameMoves,
      validateCurriculumTargets,
      validateGameLegality
    };

    window.setInterval(() => {
      if (state.view !== "legend" || !stage) return;
      state.legendPhase += 1;
      renderLegendView();
    }, 1200);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }

    render();
  </script>
</body>
</html>
